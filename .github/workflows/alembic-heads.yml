name: Alembic single-head check
on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]
jobs:
  alembic-heads:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv sync --frozen
      - run: bash scripts/check-alembic-heads.sh
